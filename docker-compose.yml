version: '3.8'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:15-alpine
    container_name: parksmart-db
    environment:
      POSTGRES_DB: ${DB_NAME:ParkingLot}
      POSTGRES_USER: ${DB_USERNAME:postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:postgres}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: UTC
    volumes:
      # Persist database data across container restarts
      - postgres-data:/var/lib/postgresql/data
      # Initialize database with schema
      - ./src/main/resources/database-init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "${DB_PORT:5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - parksmart-network

    restart: unless-stopped

  # Redis Cache Service (Optional but recommended)
  redis:
    image: redis:7-alpine
    container_name: parksmart-cache
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:redis123}
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks:
      - parksmart-network
    restart: unless-stopped

  # Spring Boot Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: parksmart-app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database Configuration
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:ParkingLot}
      DB_DRIVER: org.postgresql.Driver
      DB_USERNAME: ${DB_USERNAME:postgres}
      DB_PASSWORD: ${DB_PASSWORD:postgres}

      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:redis123}

      # Application Configuration
      SERVER_PORT: 8082
      APP_NAME: parking-lot-design
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: false
      JPA_OPEN_IN_VIEW: false

      # Logging Configuration
      LOG_LEVEL_ROOT: INFO
      LOG_LEVEL_APP: DEBUG

      # JVM Configuration
      JAVA_OPTS: -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+ParallelRefProcEnabled -Xmx512m -Xms256m
    ports:
      - "${SERVER_PORT:8082}:8082"
    volumes:
      # Mount logs directory for persistent logging
      - app-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - parksmart-network
    restart: unless-stopped
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # pgAdmin - PostgreSQL Web UI (Development Only)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: parksmart-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@parksmart.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:5050}:80"
    networks:
      - parksmart-network
    depends_on:
      - postgres
    restart: unless-stopped
    profiles:
      - dev  # Only run with: docker-compose --profile dev up

  # Redis Commander - Redis Web UI (Development Only)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: parksmart-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:redis123}
    ports:
      - "${REDIS_COMMANDER_PORT:8081}:8081"
    networks:
      - parksmart-network
    depends_on:
      - redis
    restart: unless-stopped
    profiles:
      - dev  # Only run with: docker-compose --profile dev up

volumes:
  # PostgreSQL data persistence
  postgres-data:
    driver: local

  # Redis data persistence
  redis-data:
    driver: local

  # pgAdmin data persistence
  pgadmin-data:
    driver: local

  # Application logs
  app-logs:
    driver: local

networks:
  parksmart-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

